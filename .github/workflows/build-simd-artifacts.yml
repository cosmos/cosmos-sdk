name: Build simd Nightlies

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-simd-nightlies
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    runs-on: depot-ubuntu-22.04-4
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Install aarch64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build simd (${{ matrix.goos }}-${{ matrix.goarch }})
        run: make build-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Package nightly files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          bin="simd-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp build/simd "dist/${bin}"
          chmod +x "dist/${bin}"

          sha256sum "dist/${bin}" > "dist/${bin}.sha256"

          tar -C dist -czf "dist/${bin}.tar.gz" "${bin}"
          sha256sum "dist/${bin}.tar.gz" > "dist/${bin}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: simd-main-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-nightlies:
    name: Publish nightly download page
    needs: build
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: simd-main-*
          path: artifacts
          merge-multiple: true

      - name: Prepare Pages site
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p site/nightlies

          cp artifacts/simd-*.tar.gz site/nightlies/
          cp artifacts/simd-*.tar.gz.sha256 site/nightlies/

          BASE_URL="https://${OWNER}.github.io/${REPO}/nightlies"

          cat > site/nightlies/latest.json <<EOF
          {
            "name": "simd main nightly",
            "branch": "${REF_NAME}",
            "commit": "${SHA}",
            "short_commit": "${SHA:0:7}",
            "run_id": "${RUN_ID}",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "base_url": "${BASE_URL}",
            "assets": {
              "linux-amd64": {
                "url": "${BASE_URL}/simd-linux-amd64.tar.gz",
                "sha256_url": "${BASE_URL}/simd-linux-amd64.tar.gz.sha256"
              },
              "linux-arm64": {
                "url": "${BASE_URL}/simd-linux-arm64.tar.gz",
                "sha256_url": "${BASE_URL}/simd-linux-arm64.tar.gz.sha256"
              },
              "darwin-amd64": {
                "url": "${BASE_URL}/simd-darwin-amd64.tar.gz",
                "sha256_url": "${BASE_URL}/simd-darwin-amd64.tar.gz.sha256"
              },
              "darwin-arm64": {
                "url": "${BASE_URL}/simd-darwin-arm64.tar.gz",
                "sha256_url": "${BASE_URL}/simd-darwin-arm64.tar.gz.sha256"
              }
            }
          }
          EOF

          cat > site/nightlies/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>simd nightly builds</title>
            <style>
              body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
              code, pre { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
              pre { padding: 12px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>simd nightly builds</h1>
            <p><strong>Branch:</strong> <code>${REF_NAME}</code></p>
            <p><strong>Commit:</strong> <code>${SHA}</code></p>
            <p><strong>Run:</strong> <code>${RUN_ID}</code></p>
            <p>These are non-production nightly binaries built from <code>main</code>.</p>

            <h2>Downloads</h2>
            <ul>
              <li><a href="./simd-linux-amd64.tar.gz">simd-linux-amd64.tar.gz</a> — <a href="./simd-linux-amd64.tar.gz.sha256">sha256</a></li>
              <li><a href="./simd-linux-arm64.tar.gz">simd-linux-arm64.tar.gz</a> — <a href="./simd-linux-arm64.tar.gz.sha256">sha256</a></li>
              <li><a href="./simd-darwin-amd64.tar.gz">simd-darwin-amd64.tar.gz</a> — <a href="./simd-darwin-amd64.tar.gz.sha256">sha256</a></li>
              <li><a href="./simd-darwin-arm64.tar.gz">simd-darwin-arm64.tar.gz</a> — <a href="./simd-darwin-arm64.tar.gz.sha256">sha256</a></li>
            </ul>

            <h2>Manifest</h2>
            <p><a href="./latest.json">latest.json</a></p>

            <h2>Example</h2>
            <pre><code>curl -L -o simd-linux-amd64.tar.gz ${BASE_URL}/simd-linux-amd64.tar.gz</code></pre>
          </body>
          </html>
          EOF

          cat > site/index.html <<EOF
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./nightlies/">
          <title>Redirecting...</title>
          <a href="./nightlies/">Go to nightly builds</a>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4