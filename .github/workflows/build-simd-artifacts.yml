# Build simd binaries and upload as artifacts.
# This workflow lives on release/v0.53.x. For main branch artifacts, see the workflow on main.
# Artifacts are pruned by clean-action-artifacts (7 days) but skip-recent: 5 ensures at least 5 remain.
name: Build simd Artifacts

on:
  push:
    branches:
      - release/v0.53.x
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-simd-artifacts
  cancel-in-progress: true

jobs:
  build:
    name: Build simd (v0.53.x)
    timeout-minutes: 15
    runs-on: depot-ubuntu-22.04-4
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Go 1.23 required: sonic v1.14.x fails with Go 1.24+ (GoMapIterator)
          go-version: "1.23"
          check-latest: false
          cache: true
          cache-dependency-path: go.sum
      - name: Install aarch64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Build simd (${{ matrix.goos }}-${{ matrix.goarch }})
        run: make build-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Generate checksum
        run: cd build && sha256sum simd > simd.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: simd-v0.53.x-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.run_id }}
          path: |
            build/simd
            build/simd.sha256
          if-no-files-found: error
          # No retention-days: clean-action-artifacts prunes artifacts older than 7 days

  # Publishes built binaries to the v0.53.x-nightly release for build-v53.sh downloads.
  publish-v53-nightly:
    needs: build
    name: Publish v0.53.x-nightly
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: simd-v0.53.x-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in simd-v0.53.x-*/; do
            [ ! -d "$dir" ] && continue
            # Each artifact dir is simd-v0.53.x-{goos}-{goarch}-{run_id}; extract goos-goarch
            name="${dir%/}"
            goos_goarch=$(echo "$name" | sed -n 's/^simd-v0\.53\.x-\([^-]*-[^-]*\)-[0-9]*$/\1/p')
            if [ -n "$goos_goarch" ] && [ -f "${dir}build/simd" ]; then
              cp "${dir}build/simd" "release-assets/simd-${goos_goarch}"
              chmod +x "release-assets/simd-${goos_goarch}"
              (cd release-assets && sha256sum "simd-${goos_goarch}" > "simd-${goos_goarch}.sha256")
            fi
          done
          count=$(ls release-assets/simd-* 2>/dev/null | wc -l)
          if [ "$count" -ne 8 ]; then
            echo "Expected 8 assets (4 binaries + 4 sha256), got $count"
            ls -la release-assets/
            exit 1
          fi
          ls -la release-assets/

      - name: Create v0.53.x-nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v0.53.x-nightly --yes 2>/dev/null || true
          git push origin :refs/tags/v0.53.x-nightly 2>/dev/null || true
          git tag v0.53.x-nightly ${{ github.sha }}
          git push origin v0.53.x-nightly --force
          gh release create v0.53.x-nightly ./release-assets/simd-* \
            --target ${{ github.sha }} \
            --title "v0.53.x nightly" \
            --notes "Nightly simd builds from release/v0.53.x (non-production). Used by build-v53.sh for system tests." \
            --prerelease
