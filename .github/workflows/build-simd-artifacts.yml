# Build simd binaries and upload as artifacts.
# This workflow lives on main. For release/v0.53.x, see the workflow on that branch.
# Artifacts are pruned by clean-action-artifacts (7 days) but skip-recent: 5 ensures at least 5 remain.
name: Build simd Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-simd-artifacts
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    runs-on: depot-ubuntu-22.04-4
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          check-latest: false
          cache: true
          cache-dependency-path: go.sum
      - name: Install aarch64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Build simd (${{ matrix.goos }}-${{ matrix.goarch }})
        run: make build-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Generate checksum
        run: cd build && sha256sum simd > simd.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: simd-main-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.run_id }}
          path: |
            build/simd
            build/simd.sha256
          if-no-files-found: error
          # No retention-days: clean-action-artifacts prunes artifacts older than 7 days

  # Publishes built binaries to the main-nightly release.
  publish-main-nightly:
    needs: build
    name: Publish main-nightly
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: simd-main-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in simd-main-*/; do
            [ ! -d "$dir" ] && continue
            # Each artifact dir is simd-main-{goos}-{goarch}-{run_id}; extract goos-goarch
            name="${dir%/}"
            goos_goarch=$(echo "$name" | sed -n 's/^simd-main-\([^-]*-[^-]*\)-[0-9]*$/\1/p')
            if [ -n "$goos_goarch" ] && [ -f "${dir}build/simd" ]; then
              cp "${dir}build/simd" "release-assets/simd-${goos_goarch}"
              chmod +x "release-assets/simd-${goos_goarch}"
            fi
          done
          count=$(ls release-assets/simd-* 2>/dev/null | wc -l)
          if [ "$count" -ne 4 ]; then
            echo "Expected 4 assets, got $count"
            ls -la release-assets/
            exit 1
          fi
          ls -la release-assets/

      - name: Create main-nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete main-nightly --yes 2>/dev/null || true
          git push origin :refs/tags/main-nightly 2>/dev/null || true
          git tag main-nightly ${{ github.sha }}
          git push origin main-nightly
          gh release create main-nightly ./release-assets/simd-* \
            --target ${{ github.sha }} \
            --title "main nightly" \
            --notes "Nightly simd builds from main (non-production)." \
            --prerelease
