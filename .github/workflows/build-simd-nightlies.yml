name: Build simd Nightlies

on:
  push:
    branches:
      - main
      - release/*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-simd-nightlies
  cancel-in-progress: true

jobs:
  build:
    runs-on: depot-ubuntu-22.04-4
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Install aarch64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build simd
        run: make build-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          bin="simd-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp build/simd "dist/$bin"
          chmod +x "dist/$bin"
          tar -C dist -czf "dist/$bin.tar.gz" "$bin"
          sha256sum "dist/$bin.tar.gz" > "dist/$bin.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: simd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  publish:
    needs: build
    runs-on: depot-ubuntu-22.04-4
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      # Make scripts executable
      - name: Prepare scripts
        run: chmod +x .github/nightlies/*.sh

      # Determine channel (main vs release)
      - name: Determine channel
        id: channel
        run: .github/nightlies/determine-channel.sh

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Fetch existing Pages content (best-effort merge base)
      - name: Download existing Pages content
        continue-on-error: true
        run: |
          mkdir -p existing
          curl -L "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/" \
            | tar -xz -C existing 2>/dev/null || true

      # Build site via script
      - name: Build site
        run: |
          .github/nightlies/build-site.sh \
            "${{ steps.channel.outputs.channel }}" \
            "${{ steps.channel.outputs.is_main }}"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - uses: actions/deploy-pages@v4