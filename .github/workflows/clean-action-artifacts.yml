name: Remove GitHub Action Old Artifacts

on:
  schedule:
    # Every day at 1am
    - cron: "0 1 * * *"

jobs:
  remove-old-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Remove old artifacts
        uses: c-hive/gha-remove-artifacts@44fc7acaf1b3d0987da0e8d4707a989d80e9554b # v1.4.0
        with:
          age: "7 days"
