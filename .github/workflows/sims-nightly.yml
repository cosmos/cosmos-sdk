name: Sims Nightly (Extended Determinism)
# Release sims workflow runs extended nondeterminism simulation
# This workflow only runs nightly at 8am UTC and on releases
on:
  schedule:
    - cron: "0 8 * * *"
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-sims-nightly-extended
  cancel-in-progress: true

jobs:
  test-sim-extended-nondeterminism:
    runs-on: depot-ubuntu-22.04-4
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          check-latest: true
      - name: test-sim-extended-nondeterminism
        env:
          GOMEMLIMIT: 14GiB # reserve 2 GiB as buffer for GC to avoid OOM
          SIMAPP_EXTENDED_DETERMINISM: "1"
          SIMAPP_EXTENDED_NUM_BLOCKS: "2000"
          SIMAPP_EXTENDED_BLOCK_SIZE: "500"
          SIMAPP_EXTENDED_RUNS_PER_SEED: "3"
          SIMAPP_EXTENDED_PROGRESS_EVERY: "500"
          SIMAPP_EXTENDED_SEED_RETRIES: "3"
        run: |
          cd simapp
          go test -tags sims . -run TestAppStateDeterminismExtended -count=1 -timeout 0 -v

  sims-notify-failure:
    permissions:
      contents: none
    needs: [test-sim-extended-nondeterminism]
    runs-on: depot-ubuntu-22.04-4
    if: ${{ failure() }}
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: sdk-sims
          SLACK_USERNAME: Sim Tests
          SLACK_ICON_EMOJI: ":skull:"
          SLACK_COLOR: danger
          SLACK_MESSAGE: Sims Nightly (Extended Determinism) are failing
          SLACK_FOOTER: ""
