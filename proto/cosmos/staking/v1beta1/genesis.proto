syntax = "proto3";
package cosmos.staking.v1beta1;

option go_package = "github.com/cosmos/cosmos-sdk/x/staking/types";

import "gogoproto/gogo.proto";
import "cosmos/staking/v1beta1/staking.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

// GenesisState defines the staking module's genesis state.
message GenesisState {
  // params defines all the parameters of related to deposit.
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // last_total_power tracks the total amounts of bonded tokens recorded during
  // the previous end block.
  bytes last_total_power = 2 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // last_validator_powers is a special index that provides a historical list
  // of the last-block's bonded validators.
  repeated LastValidatorPower last_validator_powers = 3 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // validators defines the validator set at genesis.
  repeated Validator validators = 4 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // delegations defines the delegations active at genesis.
  repeated Delegation delegations = 5 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // unbonding_delegations defines the unbonding delegations active at genesis.
  repeated UnbondingDelegation unbonding_delegations = 6 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // redelegations defines the redelegations active at genesis.
  repeated Redelegation redelegations = 7 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // exported defines a bool to identify whether the chain dealing with exported or initialized genesis.
  bool exported = 8;

  // consensus_key_rotation_history defines consensus key rotations that are
  // still within the unbonding window.
  repeated ConsensusKeyRotationHistory consensus_key_rotation_history = 9
      [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // pending_consensus_key_rotations defines consensus key rotations whose
  // SDK-side validator state has not reached its deferred apply height yet.
  repeated PendingConsensusKeyRotation pending_consensus_key_rotations = 10
      [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// LastValidatorPower required for validator set update logic.
message LastValidatorPower {
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  // address is the address of the validator.
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // power defines the power of the validator.
  int64 power = 2;
}

// ConsensusKeyRotationHistory stores the old consensus address for a
// validator rotation until the unbonding window has elapsed.
message ConsensusKeyRotationHistory {
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  // validator_address is the validator operator address.
  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];

  // old_consensus_address is the consensus address rotated away from.
  string old_consensus_address = 2 [(cosmos_proto.scalar) = "cosmos.ConsensusAddressString"];

  // maturity_time is the time when this rotation leaves the unbonding window.
  google.protobuf.Timestamp maturity_time = 3
      [(gogoproto.nullable) = false, (amino.dont_omitempty) = true, (gogoproto.stdtime) = true];
}

// PendingConsensusKeyRotation stores a consensus key rotation that is waiting
// for its deferred SDK-side state update.
message PendingConsensusKeyRotation {
  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  // validator_address is the validator operator address.
  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];

  // new_pubkey is the consensus public key being rotated to.
  google.protobuf.Any new_pubkey = 2 [(cosmos_proto.accepts_interface) = "cosmos.crypto.PubKey"];

  // apply_height is the block height where the SDK-side state update should
  // occur.
  int64 apply_height = 3;
}
