# E2E test chain registry.
#
# Each entry defines a real chain repo + ref that the migration tool should be
# tested against. The test runner clones the repo at the given ref, runs the
# migration, then checks the success criteria.
#
# Fields:
#   id            Short identifier used in logs and result filenames.
#   repo          Git clone URL (HTTPS).
#   ref           Tag, branch, or commit to checkout.
#   sdk_version   The SDK version this ref is on (for detection sanity-check).
#   app_dir       Relative path within the cloned repo to the app directory
#                 that contains go.mod and the main app wiring (app.go, etc.).
#                 Use "." if the repo root IS the app directory.
#   migrate_dir   Relative path to pass to the migration tool's --dir flag.
#                 Usually the same as app_dir or a parent that contains all Go files.
#   expected:
#     specs       List of spec IDs that should be detected and applied.
#     warnings    List of spec IDs expected to emit warnings (non-fatal).
#     fatal       Spec ID that should cause a fatal halt, or null if none.
#     build       Whether `go build ./...` should pass after migration.
#   skip          If true, skip this chain (useful for temporarily disabling).
#   notes         Free-form notes about this chain's quirks.

chains:

  # ── Cosmos SDK simapp (canonical reference) ─────────────────────────────
  - id: simapp-v53
    repo: https://github.com/cosmos/cosmos-sdk.git
    ref: v0.53.0
    sdk_version: v0.53.0
    app_dir: simapp
    migrate_dir: simapp
    expected:
      specs:
        - core-sdk-migration
        - crisis-removal
        - circuit-contrib-migration
        - nft-contrib-migration
        - gov-keeper-migration
        - epochs-keeper-pointer
        - ante-handler-simplification
        - app-structure-cleanup
      warnings:
        - circuit-contrib-migration
        - nft-contrib-migration
      fatal: null
      build: true
    skip: false
    notes: >
      The canonical test target. This is the simapp that the migration tool was
      originally developed against. All specs should apply cleanly and the result
      should build.

  # ── Cosmos SDK simapp v0.50 ─────────────────────────────────────────────
  - id: simapp-v50
    repo: https://github.com/cosmos/cosmos-sdk.git
    ref: v0.50.13
    sdk_version: v0.50.13
    app_dir: simapp
    migrate_dir: simapp
    expected:
      specs:
        - core-sdk-migration
        - crisis-removal
        - circuit-contrib-migration
        - nft-contrib-migration
        - gov-keeper-migration
        - ante-handler-simplification
        - app-structure-cleanup
      warnings:
        - circuit-contrib-migration
        - nft-contrib-migration
      fatal: null
      build: true
    skip: false
    notes: >
      Tests the v50 → v54 path. Epochs may not be present in v50 simapp.
      Some vanity-URL imports may not exist yet (no-op rewrites).

  # ── dYdX v4 chain ──────────────────────────────────────────────────────
  - id: dydx-v4
    repo: https://github.com/dydxprotocol/v4-chain.git
    ref: protocol/v8.0.0
    sdk_version: v0.50.x-dydx
    app_dir: protocol
    migrate_dir: protocol
    expected:
      specs:
        - core-sdk-migration
        - crisis-removal
        - circuit-contrib-migration
        - nft-contrib-migration
        - gov-keeper-migration
        - ante-handler-simplification
      warnings:
        - circuit-contrib-migration
        - nft-contrib-migration
      fatal: null
      build: false    # dydx has extensive custom modules; build may need extra work
    skip: false
    notes: >
      dYdX uses a heavily customised v0.50 fork. Has custom modules (x/vault,
      x/clob, x/listing, x/slinky) that are out of scope for these specs.
      The migration should apply cleanly to the standard SDK modules but `go build`
      may fail due to chain-specific code that references types that changed.
      Use this chain to test detection + partial application, not full build.

  # ── Osmosis ─────────────────────────────────────────────────────────────
  - id: osmosis
    repo: https://github.com/osmosis-labs/osmosis.git
    ref: v28.0.0
    sdk_version: v0.50.x-osmosis
    app_dir: .
    migrate_dir: .
    expected:
      specs:
        - core-sdk-migration
        - crisis-removal
        - gov-keeper-migration
      warnings: []
      fatal: null
      build: false    # osmosis has extensive custom wiring
    skip: true        # enable when ready to test
    notes: >
      Osmosis uses a heavily forked SDK. Useful as a stress test for detection
      and import rewriting but unlikely to build without additional chain-specific
      specs. Skip by default until we have osmosis-specific handling.

  # ── Group module test (should FAIL) ─────────────────────────────────────
  # This is a synthetic test case: any chain that uses x/group should cause
  # the migration to halt with a fatal error.
  - id: simapp-v53-with-group
    repo: https://github.com/cosmos/cosmos-sdk.git
    ref: v0.53.0
    sdk_version: v0.53.0
    app_dir: simapp
    migrate_dir: simapp
    expected:
      specs: []       # migration should halt before applying any specs
      warnings: []
      fatal: group-enterprise-migration
      build: false    # migration halts; build is not attempted
    skip: true        # this needs a patched simapp with group wired in
    notes: >
      Synthetic test case. To use this, you need to manually wire x/group
      imports into the simapp before running the migration. The expected
      behaviour is a fatal halt with the group warning message.
